# .github/dependabot.yml
version: 2
updates:
  # npm 依赖（含 devDependencies）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # 所有 minor / patch 级升级合并为一个 PR，减少分支噪音
      npm-minor-patch:
        update-types: ["minor", "patch"]
      # major 级升级单独成 PR，便于重点审查破坏性变更
      npm-major:
        update-types: ["major"]

  # GitHub Actions 版本（原笔记第 4 节为手动升级，现自动化）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
