# .github/dependabot.yml
version: 2
updates:
  # npm 依赖（含 devDependencies）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"

  # GitHub Actions 版本（原笔记第 4 节为手动升级，现自动化）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
