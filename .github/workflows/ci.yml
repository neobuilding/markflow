name: CI & Release
run-name: >-
    ${{ github.event_name == 'workflow_dispatch' && format('CI & Release (manual dispatch by {0})', github.actor)
       || github.event_name == 'pull_request' && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title)
       || github.ref_type == 'tag' && github.ref_name
       || github.event.head_commit.message }}
on:
    push:
        branches: [main]
        tags: ['v*'] # 手动推送 v* tag 可触发「重发」：重新 build + 开新 draft
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write # release 经 API 推 tag + 建 draft release 都需要

# 按 ref 隔离并发；cancel-in-progress:false 保护在途 release 出包不被打断
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: false

# 版本号的唯一来源是 compute-version job：它只「算」不「打」，先跑并输出 tag 与 version；
# build / release 都从 compute-version 的 outputs 读取，杜绝两处重复推断、保证一致。
#   - push 到 main / dispatch  → compute-version 算出 v{ver}-{提交时间}.{短SHA}（不推送）
#   - 推送 v* tag             → compute-version 复用已有 tag，version = tag 去 v
#   - PR / 非 main 分支 push  → compute-version 输出为空：build 不注入（用基础版）、release 不跑
# 「打 tag」的动作推迟到 release 阶段，通过 gh api 推送（无需 checkout），幂等可复现；
# 同一 commit 重跑得到相同 tag（提交时间取自 committer date，稳定）。
env:
    CSC_IDENTITY_AUTOMATION: false # mac 不走签名/公证自动化（与历史一致）

jobs:
    test:
        name: Typecheck & Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with: { node-version: 22, cache: npm }
            - run: npm ci
            - run: npm run typecheck
            - run: npm run build

    # 版本号的唯一来源：只「算」不「打」。不 checkout、不推 tag，纯靠 gh api 读取
    # package.json 基础版本与提交时间，输出 tag + version 给下游。
    #   - 推送 v* tag 时复用已有 tag（version = tag 去 v 前缀）；
    #   - push main / dispatch 时算出滚动版 tag（见下）；
    #   - PR 时输出为空（不推断），让 build/release 退化为纯验证。
    # 因为不 checkout，本 job 几乎只做两次 API 调用 + 一个 echo，开销趋近于 0，
    # 从而 build 在 test 之后可立即跟上，不再被 checkout/推送拖慢。
    compute-version:
        name: Compute version
        needs: test
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.compute.outputs.tag }}
            version: ${{ steps.compute.outputs.version }}
        steps:
            - name: Compute version (no checkout)
              id: compute
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -e
                  # PR：不推断版本，输出为空，让下游只做验证
                  if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                    echo "tag=" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    TAG="${GITHUB_REF_NAME}"
                    VERSION="${GITHUB_REF_NAME#v}"
                    echo "::notice::Tag push ${TAG}; reusing existing tag."
                  else
                    # 基础版本取自 package.json（经 API 读取，避免 checkout）
                    BASE=$(gh api "repos/${{ github.repository }}/contents/package.json" \
                              --jq '.content' | base64 -d \
                              | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).version))")
                    # 短 SHA（取完整 sha 前 7 位）
                    SHA7="${{ github.sha }}"
                    SHA7="${SHA7:0:7}"
                    # 提交时间取自 committer date（稳定，保证同 commit 幂等）
                    CTIME=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" --jq '.commit.committer.date')
                    BUILDTIME="$(date -u -d "$CTIME" +%Y%m%dT%H%M%SZ)"
                    TAG="v${BASE}-${BUILDTIME}.${SHA7}"
                    VERSION="${BASE}-${BUILDTIME}.${SHA7}"
                  fi
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    # 永远运行（PR / 非 main push / main push / tag push / dispatch）：三平台 build + dist。
    # 这是全仓库唯一一次三平台构建——PR 当验证用，main/tag push 当出包用，杜绝重复 build。
    # 版本来自 compute-version 的输出（唯一来源）：非空才注入，空（PR）则用 package.json 基础版。
    build:
        name: Build (${{ matrix.os }})
        needs: [test, compute-version]
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: macos-latest, target: mac, artifact-name: markflow-macos }
                    - { os: windows-latest, target: win, artifact-name: markflow-windows }
                    - { os: ubuntu-latest, target: linux, artifact-name: markflow-linux }
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with: { node-version: 22, cache: npm }

            # 复用 Electron / electron-builder 下载物缓存，加速构建
            - name: Cache Electron binaries
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.cache/electron
                      ~/.cache/electron-builder
                      ~/Library/Caches/electron
                      ~/Library/Caches/electron-builder
                      %LOCALAPPDATA%\electron\Cache
                      %LOCALAPPDATA%\electron-builder\Cache
                  key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-electron-

            # Linux 依赖安装（缺失会导致 AppImage 构建失败）
            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libnss3-dev \
                    libsecret-1-dev \
                    libxss1 \
                    libgbm1 \
                    libasound2t64 \
                    librsvg2-bin \
                    rpm \
                    fakeroot \
                    libarchive-tools

            - run: npm ci

            # 注入 compute-version 算出的版本（唯一来源）。
            # 非空（main/tag/dispatch）→ app 内部「关于」与文件名都带完整滚动版；
            # 空（PR）→ 不注入，用 package.json 基础版本号。
            - name: Inject version from compute-version
              if: needs.compute-version.outputs.version != ''
              shell: bash
              run: |
                  npm version --no-git-tag-version --no-commit-hooks "${{ needs.compute-version.outputs.version }}"

            - run: npm run build
            - run: npm run dist:${{ matrix.target }}

            # 仅 release 路径（version 非空）上传产物；PR 只验证不传（省存储）
            # 只上传最终发布格式（dmg/zip/AppImage），排除 unpacked 目录等中间物以大幅缩减 artifact 体积
            - name: Upload artifact (release path only)
              if: needs.compute-version.outputs.version != ''
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact-name }}
                  path: |
                      release/*.dmg
                      release/*.zip
                      release/*.AppImage
                  if-no-files-found: error
                  retention-days: 7

    # 下载三平台产物 → 打 tag（经 API，幂等）→ 生成 SHA256SUMS → 建 draft release（不 publish）。
    # 文件名已带完整版本（build 阶段注入 compute-version 的版本），无需改名；只按允许清单发布，无需删除任何文件。
    # 「打 tag」从 compute-version 推迟到此：用 gh api 创建 git ref，无需 checkout；
    # tag 已存在（如重跑）则跳过，避免冲突。无论 draft 是否保留，tag 都留下（可追溯）。
    release:
        name: Draft Release
        needs: [build, compute-version]
        if: needs.compute-version.outputs.tag != ''
        runs-on: ubuntu-latest
        steps:
            # 仅「计算版本」路径（非 tag push）才需打 tag；tag push 时 tag 已存在。
            - name: Push tag (computed path only)
              if: github.ref_type != 'tag'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -e
                  TAG="${{ needs.compute-version.outputs.tag }}"
                  # 幂等：tag 已存在则跳过
                  if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
                    echo "::notice::Tag $TAG already exists; skipping."
                  else
                    gh api -X POST "repos/${{ github.repository }}/git/refs" \
                      -f "ref=refs/tags/$TAG" \
                      -f "sha=${{ github.sha }}"
                    echo "::notice::Pushed tag $TAG."
                  fi

            - uses: actions/download-artifact@v8
              with: { path: artifacts }

            # 只校验真正发布的文件类型（dmg/zip/AppImage），天然排除
            # builder-debug.yml 与 *-unpacked 解包目录，无需手动删除。
            # ⚠️ 若 electron-builder.json5 增删 target（如 deb/exe），需同步更新下方 globs。
            - name: Generate SHA256SUMS
              run: |
                  cd artifacts
                  find markflow-macos markflow-windows markflow-linux -maxdepth 1 -type f \( \
                    -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' \) -print0 \
                    | sort -z | xargs -0 sha256sum > SHA256SUMS
                  cat SHA256SUMS

            # 仅发布允许清单内的文件；draft=true 由人工决定去留，本流程不自动 publish。
            - name: Create draft Release
              uses: softprops/action-gh-release@v3
              with:
                  name: ${{ needs.compute-version.outputs.tag }}
                  tag_name: ${{ needs.compute-version.outputs.tag }}
                  draft: true
                  prerelease: false
                  files: |
                      artifacts/markflow-macos/*.dmg
                      artifacts/markflow-windows/*.zip
                      artifacts/markflow-linux/*.AppImage
                      artifacts/SHA256SUMS
                  generate_release_notes: true
