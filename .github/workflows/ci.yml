name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0). Leave empty to auto-detect from commits."
        required: false
        default: ""
      dry_run:
        description: "Dry run: calculate version but do NOT create tag or release."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Test — always runs, on every trigger
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Test (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

  # ═══════════════════════════════════════════════════════════════
  #  Auto-tag — determine version (release triggers only)
  # ═══════════════════════════════════════════════════════════════
  auto-tag:
    name: Determine version
    needs: test
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_created: ${{ steps.push.outputs.tag_created }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          set -e

          # ── Tag push: tag already exists, just read it ──
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "::notice::Tag push detected: $VERSION"
            exit 0
          fi

          # ── workflow_dispatch ──

          # User supplied a version → use it directly
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format: $VERSION. Use x.y.z (e.g. 0.2.0)"
              exit 1
            fi
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
            echo "::notice::Using manually specified version: v$VERSION"
            exit 0
          fi

          # Auto-detect: find latest tag + scan commits
          # Use `|| true` before pipe to head to prevent `set -e` killing on grep no-match
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          LATEST_TAG=$(echo "$LATEST_TAG" | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "::notice::No existing version tag found, defaulting to v0.1.0"
            echo "version=v0.1.0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "::notice::Latest tag: $LATEST_TAG"

          CURRENT="${LATEST_TAG#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline --format="%s")

          if [ -z "$COMMITS" ]; then
            echo "::warning::No new commits since $LATEST_TAG. Nothing to release."
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "::group::Commits since $LATEST_TAG"
          echo "$COMMITS"
          echo "::endgroup::"

          BUMP="patch"
          if echo "$COMMITS" | grep -qE '^BREAKING CHANGE|^[a-z]+!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([a-z-]+\))?:'; then
            BUMP="minor"
          fi

          echo "::notice::Bump type: $BUMP"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "::notice::Calculated next version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Show version (dry run)
        if: inputs.dry_run
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "::warning::Dry run: no new commits, no version to release."
          else
            echo "::notice::Dry run: would create and release tag $VERSION"
          fi
          echo "Dry run complete. Nothing was published."

      - name: Create and push tag
        id: push
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run && steps.version.outputs.version != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "tag_created=true" >> $GITHUB_OUTPUT
          echo "::notice::Tag $VERSION created and pushed."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No new commits
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run && steps.version.outputs.version == ''
        run: |
          echo "::warning::No new commits since the latest tag. Push new commits first."

  # ═══════════════════════════════════════════════════════════════
  #  Build — 3-platform Electron (release triggers only)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.os }})
    needs: auto-tag
    if: |
      success() &&
      needs.auto-tag.outputs.version != '' &&
      !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifact-name: markflow-macos
            output-path: release/*.dmg
          - os: windows-latest
            target: win
            artifact-name: markflow-windows
            output-path: release/*
          - os: ubuntu-latest
            target: linux
            artifact-name: markflow-linux
            output-path: release/*.AppImage

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libnss3-dev \
            libsecret-1-dev \
            libxss1 \
            libgbm1 \
            libasound2t64 \
            librsvg2-bin \
            rpm \
            fakeroot \
            libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Inject release version into package.json
        shell: bash
        run: |
          VERSION="${{ needs.auto-tag.outputs.version }}"
          VERSION="${VERSION#v}"
          npm version --no-git-tag-version --no-commit "$VERSION"
          echo "::notice::Building with version $VERSION"

      - name: Build renderer
        run: npm run build

      - name: Build macOS
        if: matrix.target == 'mac'
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTOMATION: false

      - name: Build Windows
        if: matrix.target == 'win'
        run: |
          if (Test-Path "scripts/prepare-win-codesign.ps1") {
            powershell -ExecutionPolicy Bypass -File scripts/prepare-win-codesign.ps1 -ErrorAction SilentlyContinue
          }
          npm run dist:win

      - name: Build Linux
        if: matrix.target == 'linux'
        run: npm run dist:linux

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: release
          if-no-files-found: error
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  #  Release — GitHub Release (release triggers only)
  # ═══════════════════════════════════════════════════════════════
  release:
    name: Release
    needs: [auto-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # `gh` resolves the target repository from the local git context (or the
      # GH_REPO / GITHUB_REPOSITORY env vars). Without a checkout, `gh release …`
      # fails with "fatal: not a git repository". Checking out fixes every `gh`
      # call in this job (stale-release delete + publish).
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # Remove any stale release left by a previous failed run so the upload
      # step always starts from a clean slate. If a release for this tag
      # already exists (draft or published), softprops/action-gh-release will
      # REUSE it and try to PATCH-update its existing assets, which 404s on
      # draft releases (see root-cause note below). We delete the release
      # object only — the git tag is preserved.
      # Uses `gh api` directly (not `gh release …`) because it reliably
      # resolves both draft and published releases and is independent of the
      # local git checkout state.
      - name: Delete stale release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.version }}"
          RELEASE_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            echo "::notice::Deleting stale release $TAG (id $RELEASE_ID)"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
            echo "::notice::Stale release deleted"
          else
            echo "::notice::No existing release for $TAG"
          fi

      # Keep the release as a DRAFT during upload. If the upload fails, the
      # run aborts and we are left with an unpublished draft instead of a
      # broken public release.
      - name: Create Release (draft)
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ needs.auto-tag.outputs.version }}
          tag_name: ${{ needs.auto-tag.outputs.version }}
          draft: true
          prerelease: false
          files: |
            artifacts/markflow-macos/*
            artifacts/markflow-windows/*
            artifacts/markflow-linux/*
            !**/builder-debug.yml
          generate_release_notes: true

      # Only publish (un-draft) once every asset uploaded successfully.
      - name: Publish Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.version }}"
          gh release edit "$TAG" --draft=false
          echo "::notice::Released $TAG"