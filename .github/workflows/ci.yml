name: CI
run-name: >-
    ${{ github.event_name == 'pull_request' && format('PR {0}', github.head_ref)
       || github.event_name == 'workflow_dispatch' && 'CI dispatch'
       || github.event.head_commit.message }}
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write # 仅 auto-tag 推 tag 需要

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Typecheck & Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with: { node-version: 22, cache: npm }
            - run: npm ci
            - run: npm run typecheck
            - run: npm run build

    # 追加决策 0.3：三平台打包验证——在 PR 与 push 到 main 时都跑，验证 electron-builder
    # 能在三平台成功出包，提前暴露 Windows/macOS 平台坑；不上传、不发布。
    # Public repo 下 macOS 等 runner 免费（§11.2 #4），默认每次都验证。
    build-check:
        name: Build check (${{ matrix.os }})
        needs: test
        runs-on: ${{ matrix.os }}
        env:
            CSC_IDENTITY_AUTOMATION: false # 与发版一致：mac 不走签名/公证自动化（原 ci.yml:241）
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: macos-latest, target: mac }
                    - { os: windows-latest, target: win }
                    - { os: ubuntu-latest, target: linux }
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with: { node-version: 22, cache: npm }
            # 复用 release.yml 的 Electron 缓存（Q7 / M4）
            - name: Cache Electron binaries
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.cache/electron
                      ~/.cache/electron-builder
                      ~/Library/Caches/electron
                      ~/Library/Caches/electron-builder
                      %LOCALAPPDATA%\electron\Cache
                      %LOCALAPPDATA%\electron-builder\Cache
                  key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-electron-
            # Linux 依赖安装（原 ci.yml:207-222 原样搬；缺失会导致 AppImage 构建失败）
            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libnss3-dev \
                    libsecret-1-dev \
                    libxss1 \
                    libgbm1 \
                    libasound2t64 \
                    librsvg2-bin \
                    rpm \
                    fakeroot \
                    libarchive-tools
            - run: npm ci
            - run: npm run build
            - run: npm run dist:${{ matrix.target }} # 仅验证能出包，不 upload-artifact

    auto-tag:
        name: Auto tag on merge to main
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        # contents:write 用于推送 tag；其余 job 无需这两项权限。
        permissions:
            contents: write
        outputs:
            version: ${{ steps.version.outputs.version }}
        steps:
            - uses: actions/checkout@v6
              with: { fetch-depth: 0 }
            # 滚动发版：以 package.json.version 为「版本线」，CI 自动追加「提交UTC时间.短SHA」后缀
            #   - 版本线由开发者手动在 package.json 维护（里程碑时改），平时 merge 只换后缀、不自动 bump
            #   - 后缀 = <提交时间>.<短SHA>：可读（时间）+ 可精确追溯提交（SHA）+ 天然唯一（不撞 tag）
            #   - 用「提交时间」而非「构建时间」：同一 commit 重跑 workflow 得到相同 tag → 幂等可复现
            - name: Determine version
              id: version
              run: |
                  set -e
                  VERSION=$(node -p "require('./package.json').version")
                  echo "::notice::Base version from package.json: $VERSION"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            - name: Create and push tag
              id: create
              # tag 格式：v<version>-<提交UTC时间>.<短SHA>（如 v0.4.0-20260111T120000Z.a1b2c3d）
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  # format-local + TZ=UTC 才会把提交时间真正转成 UTC；format: 会保留提交原始时区（误贴 Z）
                  BUILDTIME="$(TZ=UTC git show -s --format=%cd --date=format-local:%Y%m%dT%H%M%SZ HEAD)"
                  SHA="$(git rev-parse --short HEAD)"
                  TAG="v${VERSION}-${BUILDTIME}.${SHA}"
                  # 幂等：直接查远端 tag 是否已存在（不依赖本地是否拉取了 tag），避免重复发版与 push 失败
                  if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "::notice::Tag $TAG already exists; skipping."
                  else
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git tag "$TAG" && git push origin "$TAG"
                  fi
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
