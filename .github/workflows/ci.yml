name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTOMATION: false
          CSC_FOR_PULL_REQUESTS: false
      - uses: actions/upload-artifact@v4
        with:
          name: markflow-macos
          path: release/*.dmg

  build-win:
    name: Build Windows
    runs-on: windows-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: markflow-windows
          path: release/win-unpacked/**

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libnss3-dev libsecret-1-dev
      - run: npm ci
      - run: npm run build
      - run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: markflow-linux
          path: release/*
