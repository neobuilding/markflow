name: CI & Release
run-name: >-
    ${{ github.event_name == 'workflow_dispatch' && 'CI & Release (dispatch)'
       || github.event_name == 'pull_request' && format('PR {0}', github.head_ref)
       || github.ref_name }}
on:
    push:
        branches: [main]
        tags: ['v*'] # 手动推送 v* tag 可触发「重发」：重新 build + 开新 draft
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write # auto-tag 推 tag + 建 draft release 都需要

# 按 ref 隔离并发；cancel-in-progress:false 保护在途 release 出包不被打断
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: false

# 是否走「打 tag + 出 draft release」的判定：
#   - push 到 main / 推送 v* tag / dispatch  → 注入版本 + 上传产物 + 打 tag + 出 draft
#   - PR / 非 main 分支 push                → 只跑 test + 三平台 build 验证，不打 tag、不出 release、不上传产物
# 说明：auto-tag 用 GITHUB_TOKEN 推送的 tag 不会触发新的 workflow run（无循环）。
env:
    CSC_IDENTITY_AUTOMATION: false # mac 不走签名/公证自动化（与历史一致）

jobs:
    test:
        name: Typecheck & Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with: { node-version: 22, cache: npm }
            - run: npm ci
            - run: npm run typecheck
            - run: npm run build

    # 永远运行（PR / 非 main push / main push / tag push / dispatch）：三平台 build + dist。
    # 这是全仓库唯一一次三平台构建——PR 当验证用，main/tag push 当出包用，杜绝重复 build。
    build:
        name: Build (${{ matrix.os }})
        needs: test
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: macos-latest, target: mac, artifact-name: markflow-macos }
                    - { os: windows-latest, target: win, artifact-name: markflow-windows }
                    - { os: ubuntu-latest, target: linux, artifact-name: markflow-linux }
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with: { node-version: 22, cache: npm }

            # 复用 Electron / electron-builder 下载物缓存，加速构建
            - name: Cache Electron binaries
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.cache/electron
                      ~/.cache/electron-builder
                      ~/Library/Caches/electron
                      ~/Library/Caches/electron-builder
                      %LOCALAPPDATA%\electron\Cache
                      %LOCALAPPDATA%\electron-builder\Cache
                  key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-electron-

            # Linux 依赖安装（缺失会导致 AppImage 构建失败）
            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libnss3-dev \
                    libsecret-1-dev \
                    libxss1 \
                    libgbm1 \
                    libasound2t64 \
                    librsvg2-bin \
                    rpm \
                    fakeroot \
                    libarchive-tools

            - run: npm ci

            # 仅 release 路径注入完整滚动版本：
            #   - 推送 v* tag 时，直接用 tag 名（去 v 前缀），与首次发版公式完全一致；
            #   - push main / dispatch 时，用 v{ver}-{提交时间}.{短SHA} 公式。
            # 注入后 app 内部「关于」显示完整滚动版，文件名也天然带完整版本。
            # PR / 非 main 不注入，app 内部与文件名均用 package.json 基础版本号。
            - name: Inject version (release path only)
              if: >-
                github.event_name == 'workflow_dispatch' ||
                (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
              shell: bash
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    FULL="${GITHUB_REF_NAME#v}"
                  else
                    BUILDTIME="$(TZ=UTC git show -s --format=%cd --date=format-local:%Y%m%dT%H%M%SZ HEAD)"
                    SHA="$(git rev-parse --short HEAD)"
                    FULL="${VERSION}-${BUILDTIME}.${SHA}"
                  fi
                  npm version --no-git-tag-version --no-commit-hooks "$FULL"

            - run: npm run build
            - run: npm run dist:${{ matrix.target }}

            # 仅 release 路径上传产物；PR / 非 main 只验证不传（省存储）
            - name: Upload artifact (release path only)
              if: >-
                github.event_name == 'workflow_dispatch' ||
                (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact-name }}
                  path: release
                  if-no-files-found: error
                  retention-days: 7

    # 生成并推送 tag（仅 main push / dispatch 真正创建；tag push 时复用已有 tag）。
    # 无论 draft 是否保留，tag 都留下（可追溯）。PR 时跳过，release 也不会跑。
    auto-tag:
        name: Auto tag
        needs: test
        if: github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.create.outputs.tag }}
        steps:
            - uses: actions/checkout@v6
              with: { fetch-depth: 0 }
            # 滚动发版：tag 形如 vX.Y.Z-<提交时间>.<短SHA>（如 v1.0.0-20260111T120000Z.a1b2c3d）
            # 用「提交时间」而非「构建时间」：同一 commit 重跑得到相同 tag → 幂等可复现。
            - name: Determine & push tag
              id: create
              run: |
                  set -e
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    TAG="${GITHUB_REF_NAME}"
                    echo "::notice::Tag push ${TAG}; reusing existing tag."
                  else
                    VERSION=$(node -p "require('./package.json').version")
                    BUILDTIME="$(TZ=UTC git show -s --format=%cd --date=format-local:%Y%m%dT%H%M%SZ HEAD)"
                    SHA="$(git rev-parse --short HEAD)"
                    TAG="v${VERSION}-${BUILDTIME}.${SHA}"
                    # 幂等：查远端 tag 是否已存在，避免重复发版与 push 失败
                    if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
                      echo "::notice::Tag $TAG already exists; skipping."
                    else
                      git config user.name "github-actions[bot]"
                      git config user.email "github-actions[bot]@users.noreply.github.com"
                      git tag "$TAG" && git push origin "$TAG"
                    fi
                  fi
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 下载三平台产物 → 生成 SHA256SUMS → 建 draft release（不 publish）。
    # 文件名已带完整版本（build 阶段注入），无需改名；只按允许清单发布，无需删除任何文件。
    release:
        name: Draft Release
        needs: [build, auto-tag]
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v8
              with: { path: artifacts }

            # 只校验真正发布的文件类型（dmg/zip/AppImage），天然排除
            # builder-debug.yml 与 *-unpacked 解包目录，无需手动删除。
            # ⚠️ 若 electron-builder.json5 增删 target（如 deb/exe），需同步更新下方 globs。
            - name: Generate SHA256SUMS
              run: |
                  cd artifacts
                  find markflow-macos markflow-windows markflow-linux -maxdepth 1 -type f \( \
                    -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' \) -print0 \
                    | sort -z | xargs -0 sha256sum > SHA256SUMS
                  cat SHA256SUMS

            # 仅发布允许清单内的文件；draft=true 由人工决定去留，本流程不自动 publish。
            - name: Create draft Release
              uses: softprops/action-gh-release@v3
              with:
                  name: ${{ needs.auto-tag.outputs.tag }}
                  tag_name: ${{ needs.auto-tag.outputs.tag }}
                  draft: true
                  prerelease: false
                  files: |
                      artifacts/markflow-macos/*.dmg
                      artifacts/markflow-windows/*.zip
                      artifacts/markflow-linux/*.AppImage
                      artifacts/SHA256SUMS
                  generate_release_notes: true
