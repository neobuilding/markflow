name: Release
run-name: >-
    ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && format('Release {0}', inputs.tag)
       || format('Release {0}', github.ref_name) }}
on:
    push:
        tags: ["v*"]
    workflow_dispatch:
        inputs:
            tag:
                description: "Existing tag to release (e.g. v0.4.0). REQUIRED for manual runs."
                required: true
                default: ""

permissions:
    contents: write

# Q3 决定：按 tag 隔离并发组 + 不取消在途发布
#   - 同一 tag 不会并发两个 release（消除 stale-release 竞争）
#   - 不同 tag 可并行发布（提升吞吐）
#   - 任何在途发布都不会被打断
concurrency:
    group: release-${{ inputs.tag || github.ref_name }}
    cancel-in-progress: false

jobs:
    verify-tag:
        name: Verify tag
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.tag || github.ref }}
                  fetch-depth: 0
            # Q2 决定：tag 不存在（含 dispatch 未填 tag）则直接报错退出
            - name: Ensure tag exists
              run: |
                  TAG="${{ inputs.tag || github.ref_name }}"
                  if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "::error::Tag '$TAG' does not exist or is not an annotated/lightweight tag."
                    exit 1
                  fi
                  echo "::notice::Tag $TAG verified."

    build:
        name: Build (${{ matrix.os }})
        needs: verify-tag
        runs-on: ${{ matrix.os }}
        env:
            CSC_IDENTITY_AUTOMATION: false # 与 ci.yml build-check 一致：mac 不走签名/公证自动化（§0.1）
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: macos-latest, target: mac, artifact-name: markflow-macos }
                    - { os: windows-latest, target: win, artifact-name: markflow-windows }
                    - { os: ubuntu-latest, target: linux, artifact-name: markflow-linux }
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.tag || github.ref }} # dispatch 时 checkout 指定 tag
            - uses: actions/setup-node@v6
              with: { node-version: 22, cache: npm }

            # Q7 决定：缓存 Electron / electron-builder 下载物，加速构建
            - name: Cache Electron binaries
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.cache/electron
                      ~/.cache/electron-builder
                      ~/Library/Caches/electron
                      ~/Library/Caches/electron-builder
                      %LOCALAPPDATA%\electron\Cache
                      %LOCALAPPDATA%\electron-builder\Cache
                  key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-electron-

            # Linux 依赖安装（原 ci.yml:207-222 原样搬；缺失会导致 AppImage 构建失败）
            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libnss3-dev \
                    libsecret-1-dev \
                    libxss1 \
                    libgbm1 \
                    libasound2t64 \
                    librsvg2-bin \
                    rpm \
                    fakeroot \
                    libarchive-tools

            - run: npm ci
            - name: Inject version
              shell: bash
              run: |
                  # 滚动发版：tag 形如 vX.Y.Z-<提交时间>.<短SHA>（如 v0.4.0-20260111T120000Z.a1b2c3d）
                  # 保留完整版本号（含后缀）注入 package.json，使 app 内部版本/文件名/可追溯性都精确到构建
                  TAG="${{ inputs.tag || github.ref_name }}"
                  VERSION="${TAG#v}"        # 去掉 v 前缀，保留完整 0.4.0-20260111T120000Z.a1b2c3d
                  # npm 官方参数为 --no-commit-hooks（非 --no-commit）
                  npm version --no-git-tag-version --no-commit-hooks "$VERSION"
            - run: npm run build
            - run: npm run dist:${{ matrix.target }}
            - uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact-name }}
                  path: release
                  if-no-files-found: error
                  retention-days: 7

    release:
        name: Publish Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/download-artifact@v8
              with: { path: artifacts }

            # ⚠️ 故意不保留「Delete stale release」步骤（与当前 ci.yml 一致）。
            # 原 `gh api …/releases/tags/{tag}` 对 DRAFT release 返回 404，因此该步骤
            # 永远清不掉「上次失败残留的 draft」（只能清到已发布的 release），实为空操作。
            # 真正的 Draft-PATCH 404 根因是三个平台目录里同名的 `builder-debug.yml`，
            # 已在下方删除；无重名文件 → 上传不会 PATCH 已有 asset → 残留 draft 无害。
            # 详见 ci-debug-notes.md §8.2。

            # 删除 builder-debug.yml（关键！）electron-builder 在三个平台产物目录各生成一份
            # 同名 builder-debug.yml，action 遇到同名 asset 会走「覆盖更新」→ PATCH，而 Draft 下
            # PATCH 一律 404。注意：`files:` 里的 `!**/builder-debug.yml` 否定式【无效】
            # （action 警告 "does not match any files" 且仍上传），必须直接从 artifacts 删除。
            # 详见 ci-debug-notes.md §8.2。
            # ⚠️ 必须在生成 SHA256SUMS 之前删除：否则校验文件会包含不会被发布的 builder-debug.yml，
            # 导致 SHA256SUMS 与实际发布产物不一致。
            - name: Remove builder-debug.yml from artifacts
              run: find artifacts -name 'builder-debug.yml' -delete

            # 删除三个平台的「unpacked」中间解包目录：mac-universal / win-unpacked / linux-unpacked。
            # 它们只是 electron-builder 的临时解包产物，真正的发布物是 dmg / zip / AppImage。
            # 若不删除会同时引发两个问题：
            #   ① Generate SHA256SUMS 里 `sha256sum platform/*` 会把目录展开进去 → 「Is a directory」失败；
            #   ② 这些目录会被一起上传到 release，导致 SHA256SUMS 与发布的产物不一致。
            # ⚠️ 必须在生成 SHA256SUMS 与上传之前删除。
            - name: Remove intermediate unpacked dirs from artifacts
              run: |
                  find artifacts -type d \( \
                    -name 'mac-universal' -o \
                    -name 'win-unpacked' -o \
                    -name 'linux-unpacked' \) -prune -exec rm -rf {} +

            # Q9 决定：生成 SHA256SUMS 校验文件（在删除 builder-debug.yml 之后，只覆盖真正发布的产物）
            - name: Generate SHA256SUMS
              run: |
                  cd artifacts
                  # 只校验普通文件（-type f），排除可能残留的目录，避免 `sha256sum: Is a directory` 失败。
                  # 配合上方已删除 builder-debug.yml 与 unpacked 目录，SHA256SUMS 仅覆盖真正发布的产物。
                  # sort -z 保证产物排序稳定，xargs -0 安全处理含空格/特殊字符的文件名。
                  # 故意保留缺失产物时本步失败（needs:build + if-no-files-found:error 已保证产物齐全）。
                  find markflow-macos markflow-windows markflow-linux -maxdepth 1 -type f -print0 \
                    | sort -z \
                    | xargs -0 sha256sum > SHA256SUMS
                  cat SHA256SUMS

            - name: Create Release (draft)
              uses: softprops/action-gh-release@v3
              with:
                  name: ${{ inputs.tag || github.ref_name }}
                  tag_name: ${{ inputs.tag || github.ref_name }}
                  draft: true
                  prerelease: false
                  files: |
                      artifacts/markflow-macos/*
                      artifacts/markflow-windows/*
                      artifacts/markflow-linux/*
                      artifacts/SHA256SUMS
                  generate_release_notes: true
            - name: Publish Release
              if: success()
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release edit "${{ inputs.tag || github.ref_name }}" --draft=false
