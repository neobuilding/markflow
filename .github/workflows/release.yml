name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build renderer
        run: npm run build
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTOMATION: false
          CSC_FOR_PULL_REQUESTS: false
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npm run dist:win
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libnss3-dev libsecret-1-dev
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
